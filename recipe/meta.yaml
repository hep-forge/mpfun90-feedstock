{% set versions = {
    "2024.12.06": "6a2e8f772f0c4a6f1af5f81b5b303e7ad91bab02c3f78da81e553c38585907c4"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'mpfun90')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  # upstream tags with dashes (2024-12-06); package version must use dots
  url: "https://github.com/APN-Pucky/mpfun90/archive/{{ version|replace('.', '-') }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  run_exports:
    # archival software -- treat the ABI as static
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('gfortran') }}
    - make
    - sed        # build.sh patches the upstream Makefile for macOS; needs GNU semantics

test:
  commands:
    - test -f $PREFIX/lib/libmpfun90${SHLIB_EXT}
    - test -f $PREFIX/include/mpfun90/mpmodule.mod

about:
  home: "https://github.com/APN-Pucky/mpfun90"
  license: "LicenseRef-DHB"
  license_file: LICENSE
  summary: "MPFUN90: arbitrary precision Fortran computation package"
  description: |
    MPFUN90 is arbitrary-precision Fortran 90 software by David H. Bailey,
    distributed under a modified BSD-3-Clause-LBNL license.

extra:
  recipe-maintainers:
    - meiyasan
